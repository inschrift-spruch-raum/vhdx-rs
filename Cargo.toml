[package]
name = "vhdx-rs"
version = "0.1.0"
edition = "2021"
description = "VHDX (Virtual Hard Disk v2) library and CLI tool"

[[bin]]
name = "vhdx-tool"
path = "src/main.rs"

[dependencies]
uuid = { version = "1.22", features = ["v4"] }
thiserror = "2.0"
byteorder = "1.5"
clap = { version = "4.6", features = ["derive"] }
crc32c = "0.6"

[dev-dependencies]
tempfile = "3.27"
