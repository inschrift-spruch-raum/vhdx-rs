[package]
name = "linkfs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "vhdx-tool"
path = "src/main.rs"

[dependencies]
uuid = { version = "1.6", features = ["v4"] }
thiserror = "1.0"
byteorder = "1.5"
clap = { version = "4.4", features = ["derive"] }
crc32c = "0.6"

[dev-dependencies]
tempfile = "3.8"
